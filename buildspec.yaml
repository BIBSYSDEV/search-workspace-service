version: 0.2

env:
  variables:
    GRADLE_USER_HOME: "/root/.gradle"
    GRADLE_OPTS: "-Dorg.gradle.configuration-cache=false"
    SAM_CLI_TELEMETRY: "0"

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - pip3 install aws-sam-cli -U
  build:
    commands:
      - ./gradlew test
      - sam build
      - sam package --s3-bucket $S3_BUCKET --output-template-file packaged_raw.yaml
  post_build:
    commands:
      # Use timestamp to force update of ApiGatewayCreateDeploymentCustomResource
      - BUILD_TIMESTAMP=$(date '+%s')
      - envsubst '${BUILD_TIMESTAMP}' < packaged_raw.yaml > packaged.yaml
artifacts:
  files:
    - packaged.yaml
cache:
  paths:
    - '/root/.gradle/caches/**/*'
    - '/root/venv/**/*'
    - '/root/.cache/pip/**/*'
    - '/root/.gradle/wrapper/**/*'